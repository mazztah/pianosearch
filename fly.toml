# Fly.io Konfiguration.
# Der App-Name muss weltweit eindeutig sein - beim ersten "fly launch" wirst du gefragt,
# ob du diesen Namen behalten oder aendern willst (siehe README.md, Schritt 2).
app = "weltklasse-pianistinnen"
primary_region = "fra"  # Frankfurt - nahester Fly.io-Standort zu Hannover

[build]

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
